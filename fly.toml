app = "daria-video-renderer"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[env]
  BG_COLOR   = "#000000"
  TEXT_COLOR = "#FFFFFF"
  FONT       = "Montserrat"
  FONT_SIZE  = "80"
  BOLD       = "1"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
